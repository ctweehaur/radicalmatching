<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>偏旁找朋友</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-6 min-h-screen flex flex-col justify-center relative overflow-hidden">

    <header class="text-center mb-10 mt-4 relative z-10">
        <h1 class="text-5xl font-bold text-blue-500 tracking-widest drop-shadow-md">偏旁找朋友</h1>
        <p class="text-gray-600 mt-4 text-xl bg-white/60 inline-block px-6 py-2 rounded-full shadow-sm border border-white">把左边的偏旁，拖到右边拼成新字吧！</p>
    </header>

    <main class="max-w-4xl mx-auto w-full grid grid-cols-2 gap-12 relative z-10">
        <div id="radicals" class="space-y-6 min-h-[350px] p-6 bg-blue-200/40 rounded-[2rem] border-4 border-white shadow-inner"></div>
        
        <div id="characters" class="space-y-6 min-h-[350px] p-6 bg-gray-100/60 rounded-[2rem] border-4 border-white shadow-inner"></div>
    </main>

    <div class="max-w-4xl mx-auto w-full mt-12 px-4 relative z-10">
        <div class="flex justify-between text-lg font-bold text-gray-600 mb-3 px-2">
            <span class="bg-white/80 px-4 py-1 rounded-full shadow-sm">🏆 闯关进度</span>
            <span id="progress-text" class="bg-white/80 px-4 py-1 rounded-full shadow-sm text-blue-500">0 / 5</span>
        </div>
        <div class="w-full bg-white border-4 border-blue-100 rounded-full h-8 overflow-hidden shadow-inner relative">
            <div id="progress-bar" class="progress-candy bg-gradient-to-r from-green-400 via-blue-400 to-blue-500 h-full w-0 transition-all duration-700 ease-out rounded-full relative">
                <div class="absolute top-0 left-0 right-0 h-1/3 bg-white/30 rounded-full"></div>
            </div>
        </div>
    </div>
    
    <script src="radical.js"></script>
</body>
</html>
